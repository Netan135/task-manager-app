<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Auth Container -->
    <div id="auth-container">
        <div class="auth-box">
            <h2>Task Manager</h2>
            
            <!-- Login Form -->
            <form id="login-form">
                <h3>Login</h3>
                <input type="email" id="login-email" placeholder="Email" required>
                <input type="password" id="login-password" placeholder="Password" required>
                <button type="submit">Login</button>
                <p>Don't have an account? <a href="#" id="show-register">Register</a></p>
            </form>

            <!-- Register Form -->
            <form id="register-form" style="display:none">
                <h3>Register</h3>
                <input type="text" id="register-username" placeholder="Username" required>
                <input type="email" id="register-email" placeholder="Email" required>
                <input type="password" id="register-password" placeholder="Password (min 6 chars)" required>
                <button type="submit">Register</button>
                <p>Already have an account? <a href="#" id="show-login">Login</a></p>
            </form>
        </div>
    </div>

    <!-- Task Container (Hidden until login) -->
    <div id="task-container" style="display:none">
        <header>
            <h1>My Tasks</h1>
            <button id="logout-btn">Logout</button>
        </header>
        
        <div class="add-task">
            <input type="text" id="task-title" placeholder="Task title...">
            <input type="text" id="task-description" placeholder="Description (optional)...">
            <button id="add-task-btn">Add Task</button>
        </div>

        <div id="task-list">
            <!-- Tasks will appear here -->
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
